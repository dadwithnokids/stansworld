<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stan's World</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Chicago&display=swap');

  /* Safari mobile — prevent overscroll and address bar shifting */
  html {
    height: -webkit-fill-available;
    overflow: hidden;
    position: fixed;
    width: 100%;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --mac-gray: #c0c0c0;
    --mac-dark: #808080;
    --mac-darker: #404040;
    --mac-white: #ffffff;
    --mac-black: #000000;
    --mac-title: #000080;
  }

  /* ── ROTATE PROMPT ── */
  #rotate-prompt {
    display: none;
    position: fixed; inset: 0;
    background: #000;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 1.1rem;
    text-align: center;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    gap: 1.5rem;
  }
  #rotate-prompt .rotate-icon {
    font-size: 3rem;
    animation: rotateAnim 2s ease-in-out infinite;
  }
  @keyframes rotateAnim {
    0%, 100% { transform: rotate(0deg); }
    50% { transform: rotate(90deg); }
  }
  @media (orientation: portrait) and (max-width: 768px) {
    #rotate-prompt { display: flex; }
    body { overflow: hidden; }
  }

  /* ── BODY / SCENE ── */
  body {
    width: 100vw; height: 100vh; height: 100dvh;
    overflow: hidden;
    background: #2a1a0a;
    font-family: 'Courier New', monospace;
    cursor: none; /* hide default cursor */
  }

  #scene-wrapper {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d0a08;
    z-index: 0;
    /* Prevent Safari bounce/scroll */
    overflow: hidden;
    touch-action: none;
  }
  #scene {
    position: relative;
    width: 100%;
    height: 100%;
    max-width: min(100vw, calc(100dvh * 16 / 9));
    max-height: min(100dvh, calc(100vw * 9 / 16));
    background: url('Desk_Image.png') center/cover no-repeat;
  }
  /* LED overlay — full scene, purely decorative */
  #led-overlay {
    position: absolute;
    left: 0.4%; top: -0.7%;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 2;
  }

  /* Laptop gif — positioned over the laptop screen */
  #laptop-gif {
    position: absolute;
    left: 47.0%;
    top: 67%;
    width: 8%;
    pointer-events: none;
    z-index: 1;
  }

  /* Hardcoded TV gif — positioned over the TV screen */
  #tv-gif {
    position: absolute;
    left: 65.06%;
    top: 66.7%;
    width: 7%;
    pointer-events: none;
    z-index: 1;
    transform-origin: center center;
  }
  #laptop-gif.wiggling {
    animation: tv-wiggle 0.45s ease;
  }

  @keyframes tv-wiggle {
    0%   { transform: rotate(0deg)    scale(1);    }
    20%  { transform: rotate(-1.5deg) scale(1.03); }
    40%  { transform: rotate(1.5deg)  scale(1.03); }
    60%  { transform: rotate(-1deg)   scale(1.02); }
    80%  { transform: rotate(1deg)    scale(1.02); }
    100% { transform: rotate(0deg)    scale(1);    }
  }
  #tv-gif.wiggling {
    animation: tv-wiggle 0.45s ease;
  }

  /* Subtle vignette to deepen edges */
  #scene::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 50% 45%, transparent 40%, rgba(0,0,0,0.35) 100%);
    pointer-events: none;
  }

  /* ── CUSTOM CURSOR (pixelated hand PNG) ── */
  #cursor {
    position: fixed;
    width: 36px; height: 36px;
    pointer-events: none;
    z-index: 99999;
    transform: translate(-10px, -4px);
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #cursor img {
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    display: block;
    filter: drop-shadow(1px 1px 0px rgba(0,0,0,0.9)) drop-shadow(2px 2px 3px rgba(0,0,0,0.4));
  }
  #cursor.pointing { transform: translate(-10px, -4px) scale(1.1); }
  /* Hide custom cursor on touch devices */
  @media (hover: none), (pointer: coarse) {
    #cursor { display: none !important; }
    body { cursor: auto !important; }
    .hotspot { cursor: pointer !important; }
  }

  /* ── HOTSPOTS ── */
  .hotspot {
    position: absolute;
    cursor: none;
  }
  .hotspot svg, .hotspot img {
    display: block;
    image-rendering: pixelated;
    max-width: 100%;
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.6));
    transition: filter 0.15s;
    transform-origin: bottom center;
  }
  /* On hover: quick nudge right then settle */
  .hotspot.hovered svg,
  .hotspot.hovered img {
    filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.6)) brightness(1.15);
    animation: hotspot-nudge 0.35s steps(1, end) forwards;
  }
  @keyframes hotspot-nudge {
    0%   { transform: translateX(0px); }
    20%  { transform: translateX(4px); }
    40%  { transform: translateX(6px); }
    60%  { transform: translateX(4px); }
    80%  { transform: translateX(2px); }
    100% { transform: translateX(3px); }
  }

  /* ── SPARKLE CANVAS ── */
  #sparkle-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 500;  /* below window (1000) and overlay (999) */
  }

  /* ── MAC OS CLASSIC MODAL ── */
  .mac-window {
    display: none;
    position: fixed;
    top: 50%; left: 50%;
    width: min(600px, 90vw);
    max-height: 80vh;
    background: var(--mac-gray);
    border: 2px solid var(--mac-black);
    box-shadow:
      inset 1px 1px 0 var(--mac-white),
      inset -1px -1px 0 var(--mac-dark),
      2px 2px 0 var(--mac-black),
      4px 4px 0 rgba(0,0,0,0.3);
    z-index: 1000;
    font-family: 'Geneva', 'Charcoal', 'Chicago', 'Courier New', monospace;
    font-size: 12px;
    image-rendering: pixelated;
    transform-origin: center center; /* overridden by JS at open time */
  }
  /* Force cursor:none on everything inside the window — prevents double cursor */
  .mac-window .mac-titlebar, .mac-window .mac-titlebar * { cursor: none !important; }

  /* Window starts hidden; JS controls visibility during zoom-rect animation */
  .mac-window.active {
    display: block;
  }
  /* .closing is only used briefly while canvas pop plays — no CSS anim needed */
  .mac-window.closing { display: none; }

  /* Zoom-rect canvas sits over everything during open animation */
  #zoom-rect-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1100;
    image-rendering: pixelated;
  }

  /* Dust canvas — behind windows, above desk image */
  #dust-canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
  }

  /* ── SCREEN OVERLAYS ── */

  /* Title bar */
  .mac-titlebar {
    background: var(--mac-black);
    color: var(--mac-white);
    display: flex;
    align-items: center;
    padding: 3px 6px;
    gap: 6px;
    user-select: none;
    cursor: move;
  }
  .mac-close-btn {
    width: 12px; height: 12px;
    background: var(--mac-gray);
    border: 1px solid var(--mac-black);
    box-shadow: inset 1px 1px 0 var(--mac-white);
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: bold;
  }
  .mac-close-btn:hover { background: #ff6666; }
  .mac-close-btn::after { content: '×'; line-height: 1; }

  .mac-title {
    flex: 1;
    text-align: center;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Striped title bar lines (Mac OS classic detail) */
  .mac-titlebar-stripes {
    position: absolute;
    top: 0; left: 28px; right: 28px;
    height: 100%;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px,
      transparent 1px,
      var(--mac-dark) 1px,
      var(--mac-dark) 2px
    );
    opacity: 0.3;
    pointer-events: none;
  }

  /* Scrollable content area */
  .mac-content {
    overflow-y: auto;
    max-height: calc(80vh - 80px);
    padding: 12px;
    background: var(--mac-white);
    margin: 4px;
    border: 1px solid var(--mac-dark);
    box-shadow: inset 1px 1px 0 var(--mac-darker);
  }

  .mac-content h2 {
    font-size: 14px;
    font-weight: bold;
    border-bottom: 1px solid var(--mac-dark);
    padding-bottom: 4px;
    margin-bottom: 8px;
  }
  .mac-content p {
    margin-bottom: 8px;
    line-height: 1.5;
  }
  /* Image layout classes */
  .mac-content img {
    display: block;
    margin: 8px 0;
    border: 1px solid var(--mac-dark);
    max-width: 100%;
  }
  /* layout: full (default) */
  .mac-content img.img-full   { width: 100%; }
  /* layout: half */
  .mac-content img.img-half   { width: 50%; }
  /* layout: third */
  .mac-content img.img-third  { width: 33%; }
  /* layout: right — floats image to right, text wraps left */
  .mac-content img.img-right  { float: right; width: 45%; margin: 0 0 8px 10px; }
  /* layout: left — floats image to left, text wraps right */
  .mac-content img.img-left   { float: left;  width: 45%; margin: 0 10px 8px 0; }
  /* clearfix after floated images */
  .mac-content .img-clear     { clear: both; }
  /* side-by-side row */
  .mac-content .img-row       { display: flex; gap: 6px; margin: 8px 0; }
  .mac-content .img-row img   { flex: 1; width: 0; margin: 0; }
  /* inline link inside description */
  .mac-content a.desc-link {
    color: var(--mac-black);
    text-decoration: underline;
    cursor: pointer;
  }
  .mac-content a.desc-link:hover { background: var(--mac-black); color: var(--mac-white); }

  /* Bottom bar */
  .mac-footer {
    padding: 8px 12px;
    border-top: 2px solid var(--mac-dark);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--mac-gray);
    min-height: 42px;
  }
  .mac-link {
    color: var(--mac-black);
    text-decoration: none;
    cursor: pointer;
    font-size: 12px;
    font-weight: bold;
    letter-spacing: 0.5px;
    padding: 5px 14px;
    background: var(--mac-gray);
    border-top: 2px solid var(--mac-white);
    border-left: 2px solid var(--mac-white);
    border-right: 2px solid var(--mac-darker);
    border-bottom: 2px solid var(--mac-darker);
    box-shadow: inset 1px 1px 0 #e8e4dc, 1px 1px 0 rgba(0,0,0,.3);
  }
  .mac-link:hover {
    background: var(--mac-black);
    color: var(--mac-white);
    border-top-color: #555;
    border-left-color: #555;
    border-right-color: var(--mac-white);
    border-bottom-color: var(--mac-white);
  }
  .mac-link:active {
    border-top: 2px solid var(--mac-darker);
    border-left: 2px solid var(--mac-darker);
    border-right: 2px solid var(--mac-white);
    border-bottom: 2px solid var(--mac-white);
    box-shadow: none;
  }

  /* Scrollbar styling */
  .mac-content::-webkit-scrollbar { width: 14px; }
  .mac-content::-webkit-scrollbar-track {
    background: var(--mac-gray);
    border-left: 1px solid var(--mac-dark);
  }
  .mac-content::-webkit-scrollbar-thumb {
    background: var(--mac-gray);
    border: 1px solid var(--mac-dark);
    box-shadow: inset 1px 1px 0 var(--mac-white);
  }

  /* ── OVERLAY ── */
  #overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 999;
  }
  #overlay.active { display: block; }

  /* ── DEMO DESK OBJECTS (placeholders) ── */
  .demo-label {
    position: absolute;
    color: rgba(255,255,220,0.5);
    font-size: 10px;
    font-family: 'Courier New', monospace;
    pointer-events: none;
    text-align: center;
    transform: translateX(-50%);
  }

  /* ── HOVER LABEL ── */
  #hover-label {
    position: fixed;
    background: #ffff99;
    border: 1px solid #000;
    padding: 2px 6px;
    font-size: 11px;
    font-family: 'Courier New', monospace;
    pointer-events: none;
    z-index: 9997;
    display: none;
    white-space: nowrap;
  }

  /* Photo grid */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3px;
    margin: 10px 0 0 0;
  }
  .photo-grid .pg-item {
    aspect-ratio: 1 / 1;
    overflow: hidden;
    cursor: pointer;
    border: 1px solid var(--mac-dark);
    background: #111;
  }
  .photo-grid .pg-item img { width:100%; height:100%; object-fit:cover; }

<!-- ROTATE PROMPT -->
<div id="rotate-prompt">
  <div class="rotate-icon">📱</div>

<div id="cursor"><img src="cursor.png" alt=""></div>

<!-- HOVER TOOLTIP -->
<div id="hover-label"></div>

<!-- SPARKLE CANVAS -->
<canvas id="sparkle-canvas"></canvas>
<canvas id="zoom-rect-canvas"></canvas>
<canvas id="dust-canvas"></canvas>

<!-- SCENE -->
<div id="scene-wrapper">
<div id="scene">

  <!-- Hardcoded TV screen gif -->
  <img id="tv-gif" src="tv-screen.gif" alt="">
  <img id="laptop-gif" src="laptop.gif" alt="">
  <img id="led-overlay" src="led.gif" alt="">

  <!-- Hotspots added via editor.html / PROJECTS array below -->

</div><!-- /scene -->

<div id="overlay"></div>

<!-- ══ PROJECT WINDOWS ══ -->

<!-- Windows are generated dynamically from PROJECTS array below -->

<script>
// ════════════════════════════════════════
// CURSOR TRACKING
// ════════════════════════════════════════
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// ════════════════════════════════════════
// SPARKLE SYSTEM — single burst on hover-enter
// Grows from 1 small diamond → 3-4 pixel diamonds, quick
// ════════════════════════════════════════
const canvas = document.getElementById('sparkle-canvas');
const ctx = canvas.getContext('2d');
let sparkles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Each sparkle: exactly 3 sprite frames — small → full → small → gone
class PixelDiamond {
  constructor(x, y, delay) {
    this.x = x;
    this.y = y;
    this.delay = delay;
    this.age = -delay;
    this.duration = 52;          // ~0.87s at 60fps — nice and slow
    this.ox = (Math.random() - 0.5) * 18;
    this.oy = (Math.random() - 0.5) * 14;
    this.vy = -0.18 - Math.random() * 0.18; // gentle upward drift
    const colors = ['#ffffff', '#ffe87c', '#ffd700', '#fff0a0', '#c8f0ff', '#ffccff'];
    this.color = colors[Math.floor(Math.random() * colors.length)];
    this.maxSize = Math.floor(Math.random() * 2 + 2); // 2, 3, or 4px
  }

  done() { return this.age > this.duration; }

  draw(ctx) {
    this.age++;
    if (this.age <= 0) return;

    const t = this.age / this.duration;

    // Hard 3-frame stepped size (no smooth tween — stays pixel-art)
    let s, alpha;
    if      (t < 0.33) { s = Math.max(1, Math.round(this.maxSize * 0.5)); alpha = 1.0; }  // frame 1: small
    else if (t < 0.66) { s = this.maxSize;                                  alpha = 1.0; }  // frame 2: full
    else if (t < 0.83) { s = Math.max(1, Math.round(this.maxSize * 0.5)); alpha = 0.6; }  // frame 3: small+dim
    else               { return; }                                                            // gone

    this.oy += this.vy;
    const px = Math.round(this.x + this.ox);
    const py = Math.round(this.y + this.oy);

    ctx.globalAlpha = alpha;
    ctx.fillStyle = this.color;

    ctx.fillRect(px, py, s, s); // center pixel
    for (let i = 1; i <= s + 1; i++) {
      const arm = Math.max(1, s - Math.floor(i * 0.4));
      ctx.fillRect(px + i * s, py, arm, arm);
      ctx.fillRect(px - i * s, py, arm, arm);
      ctx.fillRect(px, py - i * s, arm, arm);
      ctx.fillRect(px, py + i * s, arm, arm);
    }
    ctx.globalAlpha = 1;
  }
}

function spawnBurstAt(el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top  + rect.height / 3;
  // Exactly 3 sparkles, staggered 10 frames apart (~0.16s each)
  for (let i = 0; i < 3; i++) {
    sparkles.push(new PixelDiamond(cx, cy, i * 10));
  }
}

function animateSparkles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  sparkles.forEach(s => s.draw(ctx));
  sparkles = sparkles.filter(s => !s.done());
  requestAnimationFrame(animateSparkles);
}
animateSparkles();

// ════════════════════════════════════════
// HOTSPOT HOVER & CLICK
// ════════════════════════════════════════
const hoverLabel = document.getElementById('hover-label');
let activeHotspot = null;

document.querySelectorAll('.hotspot').forEach(hotspot => {
  hotspot.addEventListener('mouseenter', () => {
    activeHotspot = hotspot;
    cursor.classList.add('pointing');
    hoverLabel.style.display = 'block';
    hoverLabel.textContent = hotspot.dataset.label || '';
    hotspot.classList.add('hovered');
    // Single burst — fire once on enter
    spawnBurstAt(hotspot);
    if (hotspot.dataset.project === 'wcj-project') {
      const gif = document.getElementById('tv-gif');
      if (gif) { gif.classList.remove('wiggling'); void gif.offsetWidth; gif.classList.add('wiggling'); }
    }
  });

  hotspot.addEventListener('mousemove', e => {
    hoverLabel.style.left = (e.clientX + 20) + 'px';
    hoverLabel.style.top = (e.clientY - 10) + 'px';
  });

  hotspot.addEventListener('mouseleave', () => {
    activeHotspot = null;
    cursor.classList.remove('pointing');
    hoverLabel.style.display = 'none';
    hotspot.classList.remove('hovered');
  });

  hotspot.addEventListener('click', () => {
    const projectId = hotspot.dataset.project;
    openWindow(projectId, hotspot);
  });
});

// ════════════════════════════════════════
// WINDOW MANAGEMENT
// ════════════════════════════════════════
const overlay = document.getElementById('overlay');

// ── ZOOM RECT CANVAS ──
// Draws the classic Mac-style animated outline rectangle that zooms
// from the hotspot to the window's final position before revealing content.
const zoomCanvas = document.getElementById('zoom-rect-canvas');
const zoomCtx = zoomCanvas.getContext('2d');
function resizeZoomCanvas() {
  zoomCanvas.width  = window.innerWidth;
  zoomCanvas.height = window.innerHeight;
}
resizeZoomCanvas();
window.addEventListener('resize', resizeZoomCanvas);

function animateZoomRect(fromRect, toRect, onDone) {
  // fromRect / toRect: { x, y, w, h } in viewport coords
  const DURATION = 340;  // ms — feels like a real old Mac
  const start = performance.now();

  // Dashed line pattern — 4px on, 4px off, very pixel-y
  const DASH = [4, 4];
  let dashOffset = 0;

  function frame(now) {
    const elapsed = now - start;
    let t = Math.min(elapsed / DURATION, 1);

    // Ease: fast start, decelerates — classic Mac feel
    t = 1 - Math.pow(1 - t, 2.4);

    // Interpolate rect
    const x = fromRect.x + (toRect.x - fromRect.x) * t;
    const y = fromRect.y + (toRect.y - fromRect.y) * t;
    const w = fromRect.w + (toRect.w - fromRect.w) * t;
    const h = fromRect.h + (toRect.h - fromRect.h) * t;

    zoomCtx.clearRect(0, 0, zoomCanvas.width, zoomCanvas.height);

    const rx = Math.round(x), ry = Math.round(y);
    const rw = Math.round(w), rh = Math.round(h);

    // Soft fill — Mac gray tint that fades in as the rect grows.
    // fillAlpha goes 0 → 0.18 over the animation so it feels like
    // the window body is materialising behind the outline.
    const fillAlpha = t * 0.18;
    zoomCtx.globalAlpha = fillAlpha;
    zoomCtx.fillStyle = '#c8c8c8';
    zoomCtx.fillRect(rx, ry, rw, rh);
    zoomCtx.globalAlpha = 1;

    // Marching-ants outline — outer black
    zoomCtx.strokeStyle = '#000000';
    zoomCtx.lineWidth = 2;
    zoomCtx.setLineDash(DASH);
    zoomCtx.lineDashOffset = -dashOffset;
    zoomCtx.strokeRect(rx, ry, rw, rh);

    // Inner white offset — double-outline pixel look
    zoomCtx.strokeStyle = '#ffffff';
    zoomCtx.lineWidth = 1;
    zoomCtx.lineDashOffset = -dashOffset - 4;
    zoomCtx.strokeRect(rx + 1, ry + 1, rw - 2, rh - 2);

    zoomCtx.setLineDash([]); // reset

    dashOffset = (dashOffset + 1.5) % 8; // march the ants

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      zoomCtx.clearRect(0, 0, zoomCanvas.width, zoomCanvas.height);
      onDone();
    }
  }

  requestAnimationFrame(frame);
}

// ── Z-INDEX MANAGER ──
// Each time a window is clicked or opened it gets the highest z-index
// so it floats above all others. Base is 1000, increments up.
let topZ = 1000;
function bringToFront(win) {
  topZ++;
  win.style.zIndex = topZ;
}

// Stagger offset so multiple windows don't open perfectly stacked
let openCount = 0;

function openWindow(id, originEl) {
  const win = document.getElementById('window-' + id);
  if (!win) return;

  // If already open, just bring to front — don't re-animate
  if (win.classList.contains('active')) {
    bringToFront(win);
    return;
  }

  // Measure window height off-screen
  win.style.visibility = 'hidden';
  win.style.display = 'block';
  const winW = Math.min(600, window.innerWidth * 0.9);
  const winH = Math.min(win.offsetHeight, window.innerHeight * 0.8);
  win.style.display = 'none';
  win.style.visibility = '';

  // Cascade offset — each new window opens slightly offset from center
  // so stacked windows are visibly separate
  const cascade = (openCount % 5) * 22; // 0, 22, 44, 66, 88 px
  openCount++;

  const toRect = {
    x: (window.innerWidth  - winW) / 2 + cascade,
    y: (window.innerHeight - winH) / 2 + cascade,
    w: winW,
    h: winH,
  };

  let fromRect;
  if (originEl) {
    const r = originEl.getBoundingClientRect();
    fromRect = { x: r.left, y: r.top, w: r.width, h: r.height };
  } else {
    fromRect = {
      x: window.innerWidth  / 2 - 4,
      y: window.innerHeight / 2 - 4,
      w: 8, h: 8
    };
  }

  animateZoomRect(fromRect, toRect, () => {
    // Position at the cascaded location using absolute px (not % + transform)
    // so drag works cleanly from the start without any coordinate system switch
    win.style.transform  = 'none';
    win.style.left       = toRect.x + 'px';
    win.style.top        = toRect.y + 'px';
    win.style.opacity    = '0';
    win.style.transition = '';
    win.classList.remove('closing');
    win.style.display    = 'block';
    bringToFront(win);
    void win.offsetWidth;
    win.style.transition = 'opacity 0.18s ease-out';
    win.style.opacity    = '1';

    setTimeout(() => {
      win.style.transition = '';
      win.classList.add('active');
    }, 200);
  });
}

function closeWindow(id) {
  const win = document.getElementById('window-' + id);
  if (!win) return;

  const TILE     = 4;
  const DURATION = 1100; // faster
  const w = win.offsetWidth;
  const h = win.offsetHeight;

  // Build tile death times up front
  const cols  = Math.ceil(w / TILE);
  const rows  = Math.ceil(h / TILE);
  const tiles = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      tiles.push({ x: c * TILE, y: r * TILE, deathT: Math.random() });
    }
  }

  // Overlay canvas — drawn OVER the window using normal compositing.
  // Instead of destination-out (which needs transparency), we draw
  // BACKGROUND-COLORED tiles over the window to "erase" regions —
  // but we don't know the bg color. So instead: we reduce the window's
  // opacity globally while using clip regions to keep the surviving
  // tiles looking full-opacity.
  //
  // Simplest approach that actually works:
  // Keep window visible. Each frame, build a clip path from all the
  // tiles that are still alive — window is only visible through those tiles.

  win.style.isolation = 'isolate';

  // Create a canvas that sits on top of the window, same size,
  // draws a solid mask. We use it to rebuild the clip region each frame.
  // Actually: use SVG clipPath on the window itself.
  // Generate a <clipPath> with rects for surviving tiles, update each frame.

  // Create SVG clip path element
  const svgNS  = 'http://www.w3.org/2000/svg';
  const svg    = document.createElementNS(svgNS, 'svg');
  svg.style.cssText = 'position:absolute;width:0;height:0;overflow:hidden;';
  const defs   = document.createElementNS(svgNS, 'defs');
  const clipEl = document.createElementNS(svgNS, 'clipPath');
  const clipId = 'dissolve-clip-' + id;
  clipEl.setAttribute('id', clipId);
  defs.appendChild(clipEl);
  svg.appendChild(defs);
  document.body.appendChild(svg);

  win.style.clipPath = `url(#${clipId})`;

  const start = performance.now();

  function drawFrame(now) {
    const elapsed  = now - start;
    const progress = Math.min(elapsed / DURATION, 1);
    // Ease: slow start then accelerate — pixels trickle then rush
    const ease = Math.pow(progress, 0.8);

    // Rebuild clip path from surviving tiles
    // Batch into one big path string for performance
    let pathStr = '';
    let allDead = true;

    tiles.forEach(tile => {
      if (ease < tile.deathT) {
        // Still alive — include in clip
        pathStr += `M${tile.x},${tile.y}h${TILE}v${TILE}h-${TILE}Z `;
        allDead = false;
      }
      // else: dead — not in clip, so window is invisible there
    });

    if (allDead || progress >= 1) {
      // Done — clean up
      win.style.clipPath  = '';
      win.style.isolation = '';
      win.classList.remove('active', 'closing');
      win.style.display   = 'none';
      win.style.left = win.style.top = win.style.transform = win.style.zIndex = '';
      svg.remove();
      return;
    }

    // Apply the clip path as a single SVG path element
    clipEl.innerHTML = `<path d="${pathStr}"/>`;
    requestAnimationFrame(drawFrame);
  }

  requestAnimationFrame(drawFrame);

  const anyOpen = document.querySelectorAll('.mac-window.active').length > 0;
  if (!anyOpen) overlay.classList.remove('active');
}

// Close buttons
document.querySelectorAll('.mac-close-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    closeWindow(btn.dataset.close);
  });
});

// No overlay click-to-close — windows stay open until X is clicked.
// Overlay is now just a subtle dim behind the topmost window.

// ════════════════════════════════════════
// DRAGGABLE WINDOWS + BRING TO FRONT
// ════════════════════════════════════════
// Single shared drag state — only one window drags at a time
let dragState = null;

// Attach drag to a window element (called for both static + dynamic windows)
function makeDraggable(win) {
  const titlebar = win.querySelector('.mac-titlebar');
  if (!titlebar) return;

  // Clicking anywhere on the window brings it to front
  win.addEventListener('mousedown', () => bringToFront(win));

  titlebar.addEventListener('mousedown', e => {
    if (e.target.classList.contains('mac-close-btn')) return;
    e.preventDefault();
    bringToFront(win);

    const rect = win.getBoundingClientRect();
    // Windows are positioned with absolute left/top px — read directly
    dragState = {
      win,
      startX: e.clientX - rect.left,
      startY: e.clientY - rect.top,
    };
  });
}

document.addEventListener('mousemove', e => {
  if (!dragState) return;
  dragState.win.style.left = (e.clientX - dragState.startX) + 'px';
  dragState.win.style.top  = (e.clientY - dragState.startY) + 'px';
});

document.addEventListener('mouseup', () => { dragState = null; });

// Attach to all static windows on load
document.querySelectorAll('.mac-window').forEach(makeDraggable);

function buildProjectFromConfig(project) {
  // Create hotspot
  const hotspot = document.createElement('div');
  hotspot.className = 'hotspot';
  hotspot.dataset.project = project.id;
  hotspot.dataset.label = project.label;
  hotspot.style.left = project.left;
  hotspot.style.top = project.top;
  hotspot.style.width = project.width || '10%';
  if (project.height) hotspot.style.height = project.height;

  // Apply stored transform (rotation, skew, perspective, brightness)
  const xf = project.transform || {};
  if (xf.rotZ || xf.rotX || xf.rotY || xf.skewX || xf.skewY || (xf.persp && xf.persp !== 800)) {
    hotspot.style.transform = `perspective(${xf.persp??800}px) rotateX(${xf.rotX||0}deg) rotateY(${xf.rotY||0}deg) rotateZ(${xf.rotZ||0}deg) skewX(${xf.skewX||0}deg) skewY(${xf.skewY||0}deg)`;
  }
  if ((xf.bright !== undefined && xf.bright !== 1) || (xf.contrast !== undefined && xf.contrast !== 1)) {
    hotspot.style.filter = `brightness(${xf.bright??1}) contrast(${xf.contrast??1})`;
  }

  if (project.imageSrc) {
    const img = document.createElement('img');
    img.src = project.imageSrc;
    img.alt = project.label;
    hotspot.appendChild(img);
  }

  document.getElementById('scene').appendChild(hotspot);

  // Screen-type items (noWindow: true) — just display the image, no click/window
  if (project.noWindow) {
    hotspot.style.cursor = 'default';
    hotspot.style.pointerEvents = 'none';
    return;
  }

  // Create window
  const win = document.createElement('div');
  win.className = 'mac-window';
  win.id = 'window-' + project.id;

  // Build image HTML — each image can have a layout suffix:
  // "photo.jpg"              → full width (default)
  // "photo.jpg|half"         → 50% width
  // "photo.jpg|third"        → 33% width
  // "photo.jpg|right"        → float right, text wraps
  // "photo.jpg|left"         → float left, text wraps
  // "photo.jpg|row:photo2.jpg|row:photo3.jpg" → side-by-side row

  const images = project.images || [];
  let imgHTML = '';
  if (images.length > 0) {
    const srcs = images.map(raw => raw.split('|')[0]);
    const items = srcs.map((s, i) => `<div class="pg-item" data-src="${s}"><img src="${s}" alt=""></div>`).join('');
    imgHTML = `<div class="photo-grid">${items}</div>`;
  }
  // Parse description — supports:
  //   [link text](url)   → hyperlink
  //   **bold**           → bold
  //   *italic*           → italic
  //   blank line         → new paragraph
  function parseDesc(raw) {
    const cleaned = (raw||'').replace(/^Add a description\.\.\./, '').trim();
    return cleaned
      .split(/\n\s*\n/)               // split on blank lines → paragraphs
      .map(para => para
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
          '<a class="desc-link" href="$2" target="_blank" rel="noopener">$1</a>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+?)\*/g,    '<em>$1</em>')
        .replace(/\n/g, '<br>')
      )
      .map(para => `<p>${para}</p>`)
      .join('');
  }

  const descHTML = parseDesc(project.description);

  win.innerHTML = `
    <div class="mac-titlebar" data-window="${project.id}">
      <div class="mac-close-btn" data-close="${project.id}"></div>
      <div style="position:relative;flex:1;text-align:center;">
        <div class="mac-titlebar-stripes"></div>
        <span class="mac-title">${project.title}</span>
      </div>
      <div style="width:12px;"></div>
    </div>
    <div class="mac-content">
      <h2>${project.title}</h2>
      ${descHTML}
      ${imgHTML}
    </div>
    <div class="mac-footer">
      <span style="font-size:10px;color:#666;">Stan's World © 2026</span>
      ${project.link ? `<a class="mac-link" href="${project.link}" target="_blank" rel="noopener">↗ ${project.linkText || 'View Project'}</a>` : ''}
    </div>
  `;
  document.body.appendChild(win);

  // Attach events
  hotspot.addEventListener('mouseenter', () => {
    activeHotspot = hotspot;
    cursor.classList.add('pointing');
    hoverLabel.style.display = 'block';
    hoverLabel.textContent = hotspot.dataset.label;
    hotspot.classList.add('hovered');
    spawnBurstAt(hotspot);
  });
  hotspot.addEventListener('mousemove', e => {
    hoverLabel.style.left = (e.clientX + 20) + 'px';
    hoverLabel.style.top = (e.clientY - 10) + 'px';
  });
  hotspot.addEventListener('mouseleave', () => {
    activeHotspot = null;
    cursor.classList.remove('pointing');
    hoverLabel.style.display = 'none';
    hotspot.classList.remove('hovered');
  });
  hotspot.addEventListener('click', () => openWindow(project.id, hotspot));

  win.querySelector('.mac-close-btn').addEventListener('click', () => closeWindow(project.id));

  // Make draggable + bring-to-front using the shared drag system
  makeDraggable(win);
}

PROJECTS.forEach(buildProjectFromConfig);

// ════════════════════════════════════════
// DUST PARTICLE SYSTEM
// Slow-drifting motes that fade in and out
// independently — warm amber tones to match
// the desk lamp light
// ════════════════════════════════════════
(function() {
  const dc  = document.getElementById('dust-canvas');
  const dCtx = dc.getContext('2d');

  function resize() {
    dc.width  = window.innerWidth;
    dc.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const PARTICLE_COUNT = 38;
  const COLORS = [
    'rgba(220,180,120,',  // warm amber
    'rgba(200,160,100,',  // darker amber
    'rgba(240,210,160,',  // pale gold
    'rgba(180,150,100,',  // muted brown-gold
    'rgba(255,220,150,',  // bright highlight
  ];

  // Each dust mote has its own full lifecycle
  function makeMote() {
    const w = dc.width;
    const h = dc.height;
    return {
      x:     Math.random() * w,
      y:     Math.random() * h,
      // Very slow drift — mostly upward with slight horizontal wander
      vx:    (Math.random() - 0.5) * 0.12,
      vy:    -(Math.random() * 0.15 + 0.04),  // slow upward float
      // Size: tiny, 1–2.5px — dust not snow
      r:     Math.random() * 0.9 + 0.4,
      // Each mote fades in, holds, fades out on its own timer
      alpha:    0,
      maxAlpha: Math.random() * 0.35 + 0.08, // 0.08–0.43 — subtle
      // Lifecycle: 0=fadein 1=hold 2=fadeout
      phase:    0,
      // How long each phase lasts (in frames)
      fadeInFrames:  Math.floor(Math.random() * 180 + 80),   // 1.3–4.3s
      holdFrames:    Math.floor(Math.random() * 300 + 120),  // 2–7s
      fadeOutFrames: Math.floor(Math.random() * 200 + 100),  // 1.7–5s
      frameCount: 0,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      // Slight wobble — Brownian-ish micro motion
      wobbleX: (Math.random() - 0.5) * 0.008,
      wobbleY: (Math.random() - 0.5) * 0.005,
    };
  }

  // Stagger initial motes so they don't all pulse together
  const motes = Array.from({ length: PARTICLE_COUNT }, (_, i) => {
    const m = makeMote();
    // Start at random points in their lifecycle
    m.phase = Math.floor(Math.random() * 3);
    m.frameCount = Math.floor(Math.random() * 200);
    if (m.phase === 1) m.alpha = m.maxAlpha;
    return m;
  });

  function updateMote(m) {
    m.frameCount++;
    // Drift
    m.vx += m.wobbleX;
    m.vy += m.wobbleY;
    // Dampen so it doesn't accelerate forever
    m.vx *= 0.999;
    m.vy *= 0.999;
    m.x  += m.vx;
    m.y  += m.vy;

    // Lifecycle
    if (m.phase === 0) {
      // Fade in
      m.alpha = Math.min(m.maxAlpha, (m.frameCount / m.fadeInFrames) * m.maxAlpha);
      if (m.frameCount >= m.fadeInFrames) { m.phase = 1; m.frameCount = 0; }
    } else if (m.phase === 1) {
      // Hold — very slight pulse using sine
      m.alpha = m.maxAlpha * (0.85 + 0.15 * Math.sin(m.frameCount * 0.02));
      if (m.frameCount >= m.holdFrames) { m.phase = 2; m.frameCount = 0; }
    } else {
      // Fade out
      m.alpha = Math.max(0, m.maxAlpha * (1 - m.frameCount / m.fadeOutFrames));
      if (m.frameCount >= m.fadeOutFrames) {
        // Respawn at a new random position
        const fresh = makeMote();
        Object.assign(m, fresh);
      }
    }

    // Wrap edges — respawn on opposite side
    const pad = 10;
    if (m.x < -pad) m.x = dc.width  + pad;
    if (m.x > dc.width  + pad) m.x = -pad;
    if (m.y < -pad) m.y = dc.height + pad;
    if (m.y > dc.height + pad) m.y = -pad;
  }

  function drawDust() {
    dCtx.clearRect(0, 0, dc.width, dc.height);

    motes.forEach(m => {
      updateMote(m);
      if (m.alpha <= 0.001) return;

      // Draw as a soft radial gradient dot — blurry at edges
      const grad = dCtx.createRadialGradient(m.x, m.y, 0, m.x, m.y, m.r * 2.5);
      grad.addColorStop(0,   m.color + m.alpha + ')');
      grad.addColorStop(0.4, m.color + (m.alpha * 0.6) + ')');
      grad.addColorStop(1,   m.color + '0)');

      dCtx.beginPath();
      dCtx.arc(m.x, m.y, m.r * 2.5, 0, Math.PI * 2);
      dCtx.fillStyle = grad;
      dCtx.fill();
    });

    requestAnimationFrame(drawDust);
  }

  drawDust();
})();
</script>

<script>
(function(){
  var imgs=[],idx=0;
  function show(){document.getElementById('lb-photo').src=imgs[idx];document.getElementById('lb-counter').textContent=(idx+1)+' / '+imgs.length;}
  function lbClose(){document.getElementById('lb-overlay').classList.remove('open');}
  document.addEventListener('click',function(e){
    var item=e.target.closest&&e.target.closest('.pg-item');
    if(!item)return;
    var all=Array.from(item.closest('.photo-grid').querySelectorAll('.pg-item'));
    imgs=all.map(function(el){return el.dataset.src;});idx=all.indexOf(item);
    show();document.getElementById('lb-overlay').classList.add('open');
  });
  window.addEventListener('DOMContentLoaded',function(){
    document.getElementById('lb-x').addEventListener('click',lbClose);
    document.getElementById('lb-overlay').addEventListener('click',function(e){if(e.target===this)lbClose();});
    document.getElementById('lb-window').addEventListener('click',function(e){e.stopPropagation();});
    document.getElementById('lb-nav-l').addEventListener('click',function(){idx=(idx-1+imgs.length)%imgs.length;show();});
    document.getElementById('lb-nav-r').addEventListener('click',function(){idx=(idx+1)%imgs.length;show();});
  });
  document.addEventListener('keydown',function(e){
    if(!document.getElementById('lb-overlay').classList.contains('open'))return;
    if(e.key==='Escape')lbClose();
    if(e.key==='ArrowLeft'){idx=(idx-1+imgs.length)%imgs.length;show();}
    if(e.key==='ArrowRight'){idx=(idx+1)%imgs.length;show();}
  });
})();
</script>
